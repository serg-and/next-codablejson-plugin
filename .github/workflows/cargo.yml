name: Cargo test

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - ".cargo/**"
      - "Cargo.*"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - ".cargo/**"
      - "Cargo.*"
      - ".github/workflows/**"

env:
  RUST_LOG: debug
  CARGO_INCREMENTAL: 0
  CI: "1"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    name: Test - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Handle line endings
        shell: bash
        if: runner.os == 'Windows'
        run: |
          git config --system core.autocrlf false
          git config --system core.eol lf
      - uses: actions/checkout@v2
        with:
          submodules: true
      - name: Setup node
        uses: actions/setup-node@v2
        with:
          node-version: 22
      - name: Output rust version
        run: rustup --version
      - name: Configure path (windows)
        shell: bash
        if: runner.os == 'Windows'
        run: |
          echo 'C:\\npm\\prefix' >> $GITHUB_PATH
      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/
            target
          key: cargo-dev-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-dev-${{ runner.os }}
      - name: Run cargo test
        run: |
          cargo test --all --color always
